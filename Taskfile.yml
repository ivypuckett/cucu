version: "3"

vars:
  BIN: bin
  NIM_FLAGS: --gc:arc

tasks:
  default:
    desc: Build all targets
    deps: [cli, c-shared, c-static, js]

  cli:
    desc: Build the CLI executable (bin/hello)
    cmds:
      - mkdir -p {{.BIN}}
      - nim c {{.NIM_FLAGS}} -o:{{.BIN}}/hello src/hello_cli.nim

  c-shared:
    desc: Build the shared C library (bin/libhello.so)
    cmds:
      - mkdir -p {{.BIN}}
      - nim c --app:lib --noMain {{.NIM_FLAGS}} -o:{{.BIN}}/libhello.so src/hello_c.nim

  c-static:
    desc: Build the static C library (bin/libhello.a)
    cmds:
      - mkdir -p {{.BIN}}
      - nim c --app:staticlib --noMain {{.NIM_FLAGS}} -o:{{.BIN}}/libhello.a src/hello_c.nim

  js:
    desc: Build the JavaScript output (bin/hello.js)
    cmds:
      - mkdir -p {{.BIN}}
      - nim js -o:{{.BIN}}/hello.js src/hello_js.nim

  test-cli:
    desc: Run CLI Cucumber tests (requires bin/hello)
    dir: tests-cli
    cmds:
      - bundle install --quiet
      - bundle exec cucumber

  test-js:
    desc: Run JavaScript Cucumber tests (requires bin/hello.js)
    dir: tests-js
    cmds:
      - npm install --silent
      - npm test

  test-cpp:
    desc: Build and run C++ Cucumber wire tests (requires bin/libhello.so)
    dir: tests-cpp
    cmds:
      - cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - cmake --build build
      - bundle install --quiet
      - bundle exec cucumber

  test:
    desc: Run all test suites (tests-cli, tests-js, tests-cpp)
    deps: [test-cli, test-js, test-cpp]

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN}} nimcache
